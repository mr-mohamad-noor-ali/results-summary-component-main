<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  
  <div class="contaner">
    <div class="c1">
      <div class="result">

        <div class="result-text">
          Your Result
        </div>

        <div class="result-num">
          
          <div class="result-pers">
            76
          </div>
          of 100
        </div>

        <div class="great">
          <strong>Great</strong>
        </div>
        <div class="great-text">
          You scored higher than 65% of the people who have taken these tests.
        </div>
        

  </div>

  <div class="summary">

    <div class="summary-text">
      Summary
    </div>

    <div class="reaction">
      
      <div>
        <img src="assets/images/icon-reaction.svg" alt="">
        Reaction
      </div>
      <div class="reaction-value">
        <span>
          80
        </span>
        / 100
      </div>

    </div>
    

    <div class="reaction memory">
      
      <div>
        <img src="assets/images/icon-memory.svg" alt="memory icon">
        Memory
      </div>
      <div class="reaction-value">
        <span>
          92
        </span>
        / 100
      </div>

    </div>


    
    <div class="reaction verbal">
      
      <div>
        <img src="assets/images/icon-verbal.svg" alt="verbal imge">
        Verbal
        
      </div>
      <div class="reaction-value">
        <span>
          61
        </span>
        / 100
      </div>

    </div>
    

    <div class="reaction visual">
      
      <div>
        <img src="assets/images/icon-visual.svg" alt="visual icon">
          Visual
        
      </div>
      <div class="reaction-value">
        <span>
          73
        </span>
        / 100
      </div>

    </div>
    
    <button class="continue">Continue</button>
    

  </div>
  </div>
</div>
  

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Mohamad Noor</a>.
  </footer>
</body>
</html>
